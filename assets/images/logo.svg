<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" width="200" height="48">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- FK badge -->
  <rect x="0" y="4" width="40" height="40" rx="8" fill="url(#grad)"/>
  <text x="20" y="30" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="18" fill="#fff" text-anchor="middle">FK</text>
  <!-- Brand name -->
  <text x="52" y="20" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="14" fill="currentColor">Franck</text>
  <text x="52" y="37" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="12" fill="currentColor" opacity="0.7">Kanza</text>
</svg>
